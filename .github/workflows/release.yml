name: Release

# Publishes @arcade2d/engine to npm when a GitHub Release is published.
# The version bump is done locally before tagging:
#   yarn changeset      # record changes
#   yarn version-packages   # bump versions + changelog, commit
#   git tag vX.Y.Z && git push --tags
# then create a GitHub Release for that tag.
on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: corepack enable
      - run: yarn install --immutable

      # Builds the engine then runs `changeset publish`, which publishes any
      # package whose local version is not yet on npm (idempotent).
      - run: yarn release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
